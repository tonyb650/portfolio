<?xml version="1.0" encoding="UTF-8" standalone="no"?>

<svg id="svgrect" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <text id="svgtext" x="10" y="50" font-size="5">
    CSS to animate SVG text
  </text>

  <style>
    #svgtext {
      animation:textchanges 5s linear infinite alternate;
    }

    @keyframes textchanges {
      100% {
        letter-spacing: 1.5px;
      }
    }
  </style>
</svg>